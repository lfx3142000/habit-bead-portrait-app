name: Android Build

run-name: >-
  Android Build
  ${{ github.event_name == 'issues' && github.event.issue.title || github.ref_name }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  issues:
    types: [ opened ]
  workflow_dispatch:
    inputs:
      build_variant:
        description: Gradle build variant to assemble
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release_bundle

jobs:
  build:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, '[build apk]')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_variant == 'debug' }}
        run: gradle :app:assembleDebug --no-daemon

      - name: Run Android lint
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_variant == 'debug' }}
        run: gradle :app:lintDebug --no-daemon

      - name: Upload debug APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_variant == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: habit-beads-${{ inputs.build_variant || 'debug' }}-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Build release App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_variant == 'release_bundle' }}
        env:
          HABIT_BEADS_RELEASE_KEYSTORE_BASE64: ${{ secrets.HABIT_BEADS_RELEASE_KEYSTORE_BASE64 }}
          HABIT_BEADS_RELEASE_STORE_PASSWORD: ${{ secrets.HABIT_BEADS_RELEASE_STORE_PASSWORD }}
          HABIT_BEADS_RELEASE_KEY_ALIAS: ${{ secrets.HABIT_BEADS_RELEASE_KEY_ALIAS }}
          HABIT_BEADS_RELEASE_KEY_PASSWORD: ${{ secrets.HABIT_BEADS_RELEASE_KEY_PASSWORD }}
        run: |
          echo "$HABIT_BEADS_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/habitbeads-release.keystore"
          HABIT_BEADS_RELEASE_STORE_FILE="$RUNNER_TEMP/habitbeads-release.keystore" gradle :app:bundleRelease --no-daemon

      - name: Upload release App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_variant == 'release_bundle' }}
        uses: actions/upload-artifact@v4
        with:
          name: habit-beads-release-aab
          path: app/build/outputs/bundle/release/*.aab
